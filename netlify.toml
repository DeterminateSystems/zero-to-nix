[build]
command = "./scripts/netlify-redirects.sh >> netlify.toml && npm ci && npm run build"
publish = "dist"

[build.environment]
# This is a hack that prevents Netlify from running `npm install`, as we
# only want to run `npm ci`, which actually uses the `package-lock.json` lockfile.
# Source: https://answers.netlify.com/t/how-can-i-use-npm-ci-instead-of-npm-install/12570/14
NPM_FLAGS = "--version"
NODE_VERSION = "24.13.0" # Keep this in step with `nix develop --command node --version`

[context.production]
environment = { ENV = "production" }

[[edge_functions]]
function = "markdown"
path = "/concepts/*"
excludedPath = ["/concepts/*.md"]

[[edge_functions]]
function = "markdown"
path = "/start/*"
excludedPath = ["/start/*.md"]

[[redirects]]
from = "/quick-start"
to = "/start.html"
status = 301

[[redirects]]
from = "/quickstart"
to = "/start.html"
status = 301

[[redirects]]
from = "/get-started"
to = "/start.html"
status = 301

[[redirects]]
from = "/getting-started"
to = "/start.html"
status = 301

[[redirects]]
from = "/start/nix-build-nixpkgs"
to = "/start/nix-build#nixpkgs"
status = 301

[[redirects]]
from = "/start/nix-build-flake"
to = "/start/nix-build#flake"
status = 301

[[redirects]]
from = "/start/dev-shell-flake"
to = "/start/nix-develop#flake"
status = 301
